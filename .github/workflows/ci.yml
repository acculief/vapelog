name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Check (Next.js + Turbopack)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy?pgbouncer=true"
      DIRECT_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      NEXTAUTH_SECRET: "ci-dummy-secret-32chars-xxxxxxxxxx"
      NEXTAUTH_URL: "http://localhost:3000"
      CRON_SECRET: "ci-cron-secret"
      NEXT_PUBLIC_SUPABASE_URL: "https://cuinyjpiifcslzexrunc.supabase.co"
      SUPABASE_SERVICE_ROLE_KEY: "dummy-service-role-key"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Next.js Build (Turbopack)
        run: npx next build
